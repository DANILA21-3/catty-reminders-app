name: CD Deployment

on:
  push:
    branches: [ lab3, lab3*, main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Prepare lowercase repo name
        id: prep
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=${REPO_LOWER}" >> $GITHUB_OUTPUT
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          username: da
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3161
          script: |
            set -x  
            echo "=== TOKEN length: ${#GHCR_PAT} ==="
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker stop app-container || true
            docker rm app-container || true
            
            echo "=== IMAGE: ghcr.io/${{ steps.prep.outputs.repo_lower }}:${{ github.sha }} ==="
            docker pull -v ghcr.io/${{ steps.prep.outputs.repo_lower }}:${{ github.sha }}
            
            docker run -d \
              --name app-container \
              --restart unless-stopped \
              -p 8181:8181 \
              -e DEPLOY_REF="${{ github.sha }}" \
              ghcr.io/${{ steps.prep.outputs.repo_lower }}:${{ github.sha }}
            
            docker image prune -f
