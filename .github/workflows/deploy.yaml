name: CD Deployment

on:
  push:
    branches: [ lab3, lab3*, main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Prepare lowercase repo name
        id: prep
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=${REPO_LOWER}" >> $GITHUB_OUTPUT
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          username: da
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3161
          script: |
            set -x
            
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            REPO_LOWER="${{ steps.prep.outputs.repo_lower }}"
            
            docker stop app-container || true
            docker rm app-container || true
            
            docker pull ghcr.io/${REPO_LOWER}:${{ github.sha }}
            
            docker run -d \
              --name app-container \
              --restart unless-stopped \
              -p 8181:8181 \
              -e DEPLOY_REF="${{ github.sha }}" \
              ghcr.io/${REPO_LOWER}:${{ github.sha }}
            
            docker image prune -f
