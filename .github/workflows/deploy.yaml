name: CD Deployment

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          username: da
          port: 3161
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/da/catty-reminders-app
            export IMAGE=ghcr.io/danila21-3/catty-reminders-app:${{ github.sha }}
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u DANILA21-3 --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
