name: CD Deployment

on:
  push:
    branches: [ lab3, lab3*, main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Prepare lowercase repo name
        id: prep
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=${REPO_LOWER}" >> $GITHUB_OUTPUT
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          REPO_OWNER: DANILA21-3
        with:
          host: course.prafdin.ru
          username: da
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3161
          script: |
            set -e

            echo "=== DEBUG ==="
            echo "GHCR_PAT length: ${#GHCR_PAT}"
            echo "Actor: ${{ github.actor }}"
            echo "Repository: ${{ github.repository }}"
            echo "SHA: ${{ github.sha }}"
            echo "=============="
            
            echo "=== TOKEN length: ${#GHCR_PAT} ==="

            echo "$GHCR_PAT" | docker login ghcr.io -u $REPO_OWNER --password-stdin

            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            IMAGE="ghcr.io/${REPO_LOWER}:${{ github.sha }}"

            echo "=== Pulling $IMAGE ==="

            docker stop app-container || true
            docker rm app-container || true

            docker pull "$IMAGE" || { echo "ERROR: Failed to pull image"; exit 1; }

            docker run -d \
              --name app-container \
              --restart unless-stopped \
              -p 8181:8181 \
              -e DEPLOY_REF="${{ github.sha }}" \
              "$IMAGE"

            docker image prune -f
