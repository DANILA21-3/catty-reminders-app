name: CD Deployment

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          username: da
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3161
          script: |
            cd /home/da/lab2_
            git fetch --all
            git reset --hard ${{ github.sha }}
            
            echo "DEPLOY_REF=${{ github.sha }}" > /home/da/lab2_/.env
            
            if [ ! -d ".venv" ]; then
                python3 -m venv .venv
            fi
            source .venv/bin/activate
            pip install -r requirements.txt
            
            sudo systemctl restart app
