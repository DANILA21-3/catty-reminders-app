name: CD Deployment

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: course.prafdin.ru
          username: da
          port: 3161
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yaml"
          target: "/home/da/catty-reminders-app"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          username: da
          port: 3161
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/da/catty-reminders-app
            export IMAGE=ghcr.io/danila21-3/catty-reminders-app:${{ github.sha }}
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u DANILA21-3 --password-stdin
            docker compose pull
            export DB_PASSWORD=mypass
            docker compose up -d --remove-orphans
            docker image prune -f
