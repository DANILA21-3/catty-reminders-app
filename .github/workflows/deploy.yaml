name: CD Deployment

on:
  push:
    branches: [ lab3, lab3*, main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare repo name
        id: prep
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=${REPO_LOWER}" » $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DOCKER_PAT: ${{ secrets.DOCKER_PAT }}  
        with:
          host: course.prafdin.ru
          username: da
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3161
          script: |
            set -e

            echo "=== DEBUG ==="
            echo "DOCKER_PAT length: ${#DOCKER_PAT}"
            echo "SHA: ${{ github.sha }}"
            echo "Repository: ${{ github.repository }}"
            echo "============="

            if [ ${#DOCKER_PAT} -lt 10 ]; then
              echo "ERROR: DOCKER_PAT secret is empty or not found!"
              exit 1
            fi

            echo "=== Logging into GHCR ==="
            echo "$DOCKER_PAT" | docker login ghcr.io -u DANILA21-3 --password-stdin

            IMAGE="ghcr.io/danila21-3/catty-reminders-app:${{ github.sha }}"

            echo "=== Pulling $IMAGE ==="

            docker stop app-container || true
            docker rm app-container || true

            docker pull "$IMAGE" || { echo "ERROR: Pull failed"; exit 1; }

            docker run -d \
              --name app-container \
              --restart unless-stopped \
              -p 8181:8181 \
              -e DEPLOY_REF="${{ github.sha }}" \
              "$IMAGE"

            docker image prune -f
            echo "=== Deployment completed successfully ==="
