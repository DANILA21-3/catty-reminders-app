name: CI Pipeline

on:
  push:
    branches: [ "lab3*" ]
  pull_request:
    branches: [ lab3 ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
          
      - name: Install Playwright
        run: |
          playwright install --with-deps chromium
            
      - name: Start application
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8181 &
          sleep 3
          echo "App started on port 8181"
          curl http://localhost:8181/ || echo "App is running"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --junitxml=test_result.xml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DEPLOY_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
